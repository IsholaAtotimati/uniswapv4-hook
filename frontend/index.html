<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Idle Liquidity Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
<div class="logo">
    <img src="img/wolve.PNG" alt="">
    IdleFi
</div>

<div class="menu">
<a href="#dashboardPage">Dashboard</a>
<a href="#positionsPage">Positions</a>
<a href="#analyticsPage">Analytics</a>
</div>

<button id="connect">Connect Wallet</button>
</nav>

<main id="dashboardPage">

<section class="stats">
<div class="card">
<h3>Total Yield</h3>
<p id="totalYield">0</p>
</div>

<div class="card">
<h3>Idle LPs</h3>
<p id="idleCount">0</p>
</div>

<div class="card">
<h3>Active Pools</h3>
<p id="poolCount">3</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status">Disconnected</p>
</div>
</section>

<section class="actions">
<h2>Pool Selection</h2>
<select id="poolSelect">
<option value="">Select Pool</option>
</select>
</section>

<section class="actions">
<h2>Register Position</h2>
<input id="liquidity0" placeholder="Liquidity side 0">
<input id="liquidity1" placeholder="Liquidity side 1 (optional)">
<input id="lower" placeholder="Lower Tick">
<input id="upper" placeholder="Upper Tick">
<button id="registerBtn">Register</button>
</section>

</main>

<main id="positionsPage">

<section class="positions">
<h2>Your Positions</h2>

<table>
<thead>
<tr>
<th>Liquidity0</th><th>Liquidity1</th>
<th>Range</th>
<th>Status</th>
<th>Yield</th>
</tr>
</thead>

<tbody id="positionTable"></tbody>
</table>

<br>

<button id="claimBtn">Claim Yield</button>

</section>

</main>

<main id="analyticsPage">

<section class="chart">
<h2>Yield Analytics</h2>
<canvas id="chart"></canvas>
</section>

<section class="chart">
<h2>Pool TVL Analytics</h2>
<canvas id="poolChart"></canvas>
</section>

<section class="activity">
<h2>Live Activity</h2>
<ul id="activityFeed"></ul>
</section>

</main>

<script src="contract.js?v=2"></script>
<script src="app.js?v=2"></script>

</body>
</html>
